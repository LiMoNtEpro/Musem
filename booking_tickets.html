<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="booking-style.css">
    <link rel="icon" href="assets/favicon.ico" type="image/x-icon">
    <title>Booking Tickets</title>
</head>
<body>
    <div class="container">
        <div class="information">
            <img src="/assets/svg/booking/logo.svg" alt="" class="logo">
            <p class="information-title">Booking tickets</p>
            <p class="information-subtitle">Tour to Louvre</p>
            <div class="information-line"></div>
            <div class="date-time">
                <div class="button date-button">
                    <img src="assets/svg/booking/date.svg" alt="" class="button-image">
                    <p class="button-text">Date</p>
                    <img src="assets/svg/booking/arrow.svg" alt="" class="button-arrow">
                </div>
                <div class="button time-button">
                    <img src="assets/svg/booking/time.svg" alt="" class="button-image">
                    <p class="button-text">Time</p>
                    <img src="assets/svg/booking/arrow.svg" alt="" class="button-arrow">
                </div>
            </div>
            <div class="button name-button">
                <img src="assets/svg/booking/name.svg" alt="" class="button-image">
                <p class="button-text">Name</p>
            </div>
            <div class="button email-button">
                <img src="assets/svg/booking/email.svg" alt="" class="button-image">
                <p class="button-text">E-mail</p>
            </div>
            <div class="button phone-button">
                <img src="assets/svg/booking/tel.svg" alt="" class="button-image">
                <p class="button-text">Phone</p>
            </div>
            <div class="button ticket-type-button">
                <img src="assets/svg/booking/ballot.svg" alt="" class="button-image">
                <p class="button-text">Ticket Type</p>
                <img src="assets/svg/booking/arrow.svg" alt="" class="button-arrow">
            </div>
            <div class="entry-ticket">
                <p class="entry-ticket-title">Entry ticket</p>
                <div class="entry-ticket-line"></div>
                <div class="entry-ticket-basic">
                    <p class="entry-ticket-text">Basic 18+ (20 €)</p>
                    <div class="entry-ticket-counter counter-basic">
                        <div class="counter-minus"><div class="minus"></div></div>
                        <div class="counter-num"><p class="num">2</p></div>
                        <div class="counter-plus"><img src="assets/svg/booking/Vector.svg" alt="" class="plus"></div>
                    </div>
                </div>
                <div class="entry-ticket-senior">
                    <p class="entry-ticket-text">Senior 65+ (10 €)</p>
                    <div class="entry-ticket-counter counter-senior">
                        <div class="counter-minus"><div class="minus"></div></div>
                        <div class="counter-num"><p class="num">2</p></div>
                        <div class="counter-plus"><img src="assets/svg/booking/Vector.svg" alt="" class="plus"></div>
                    </div>
                </div>
            </div>
        </div>
        <div class="overview"></div>
    </div>
</body>
</html>
